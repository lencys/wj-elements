<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Animation</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/gh/lencys/wj-elements@e5cdd8566b4acaad5c11040bfbb4e09e170074c9/wj-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lencys/wj-elements@e5cdd8566b4acaad5c11040bfbb4e09e170074c9/style.css" />
    <script type="module"  src="https://cdn.jsdelivr.net/npm/wj-elements@0.0/+esm"></script>
  </head>
  <body>
    <div class="playground">
      <div class="content">
        <wj-animation name="heartBeat">
          <wj-avatar>
            <wj-img src="/assets/img/avatar.svg"></wj-img>
          </wj-avatar>
        </wj-animation>
        <div style="margin-top: 1rem">
          <wj-button id="stop">Stop</wj-button>
          <wj-button id="play">Play</wj-button>
        </div>
      </div>
    </div>
  </body>
</html>
