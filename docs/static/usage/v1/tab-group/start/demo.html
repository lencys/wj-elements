<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TabGroup</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="max-width: 60%; margin: auto">
        <wje-card>
          <wje-tab-group variant="start">
            <wje-tab slot="nav" panel="general">General</wje-tab>
            <wje-tab slot="nav" panel="custom" active>Custom</wje-tab>
            <wje-tab slot="nav" panel="advanced">Advanced</wje-tab>
            <wje-tab slot="nav" panel="disabled" disabled>Disabled</wje-tab>

            <wje-tab-panel name="general">This is the general tab panel.</wje-tab-panel>
            <wje-tab-panel name="custom">This is the custom tab panel.</wje-tab-panel>
            <wje-tab-panel name="advanced">This is the advanced tab panel.</wje-tab-panel>
            <wje-tab-panel name="disabled">This is a disabled tab panel.</wje-tab-panel>
          </wje-tab-group>
        </wje-card>
      </div>
    </div>
  </body>
</html>
