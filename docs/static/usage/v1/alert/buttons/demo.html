<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />

    <style>
      .container {
        flex-direction: column;
      }

      .container p {
        margin-bottom: 0;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-button id="present-alert">Click Me</ion-button>
          <ion-alert trigger="present-alert" header="Alert!"></ion-alert>
          <p id="handlerResult"></p>
          <p id="roleResult"></p>
        </div>
      </ion-content>
    </ion-app>

    <script>
      const handlerOutput = document.querySelector('#handlerResult');
      const roleOutput = document.querySelector('#roleResult');
      const alert = document.querySelector('ion-alert');

      alert.buttons = [
        {
          text: 'Cancel',
          role: 'cancel',
          handler: () => {
            handlerOutput.innerText = 'Alert canceled';
          },
        },
        {
          text: 'OK',
          role: 'confirm',
          handler: () => {
            handlerOutput.innerText = 'Alert confirmed';
          },
        },
      ];

      alert.addEventListener('ionAlertDidDismiss', (ev) => {
        roleOutput.innerText = `Dismissed with role: ${ev.detail.role}`;
      });
    </script>
  </body>
</html>
