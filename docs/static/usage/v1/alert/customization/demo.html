<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Alert</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />

    <style>
      ion-alert.custom-alert {
        --backdrop-opacity: 0.7;
      }

      .custom-alert .alert-button-group {
        padding: 8px;
      }

      button.alert-button.alert-button-confirm {
        background-color: var(--ion-color-success);
        color: var(--ion-color-success-contrast);
      }

      .md button.alert-button.alert-button-confirm {
        border-radius: 4px;
      }

      .ios .custom-alert button.alert-button {
        border: 0.55px solid rgba(var(--ion-text-color-rgb, 0, 0, 0), 0.2);
      }

      .ios button.alert-button.alert-button-cancel {
        border-right: 0;
        border-bottom-left-radius: 13px;
        border-top-left-radius: 13px;
      }

      .ios button.alert-button.alert-button-confirm {
        border-bottom-right-radius: 13px;
        border-top-right-radius: 13px;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-button id="present-alert">Click Me</ion-button>
          <ion-alert trigger="present-alert" class="custom-alert" header="Are you sure?"></ion-alert>
        </div>
      </ion-content>
    </ion-app>

    <script>
      const alert = document.querySelector('ion-alert');

      alert.buttons = [
        {
          text: 'No',
          cssClass: 'alert-button-cancel',
        },
        {
          text: 'Yes',
          cssClass: 'alert-button-confirm',
        },
      ];
    </script>
  </body>
</html>
