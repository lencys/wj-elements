<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chip</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
    </head>
  <body>
    <div class="container">
      <div class="content">
        <wj-chip>
          <wj-avatar>
            <wj-img src="https://ionicframework.com/docs/img/demos/avatar.svg"></wj-img>
          </wj-avatar>
          <wj-label>Avatar Chip</wj-label>
          <wj-icon name="circle-xmark"></wj-icon>
        </wj-chip>

        <wj-chip removable>
          <wj-icon name="location-pin" color="complete"></wj-icon>
          <wj-label>Icon Chip</wj-label>
        </wj-chip>
      </div>
    </div>
  </body>
</html>
