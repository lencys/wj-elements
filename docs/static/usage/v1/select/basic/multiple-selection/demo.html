<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProgressBar</title>
    <link rel="stylesheet" href="../../../../common.css" />
    <script src="../../../../common.js"></script>
    <!--    <script type="module" src="../../../../../js/demo.js"></script>-->
    <script type="module" src="./../../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="./../../../../../wje-elementy/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content" style="min-width: 60%; margin-bottom: 20%">
        <wje-select
          placeholder="Select options"
          variant="standard"
          max-options="2"
          variant="standard"
          multiple
          clearable
        >
          <wje-option value="option-1">Option 1</wje-option>
          <wje-option value="option-2">
            Option 2
            <wje-icon name="heart" slot="end"></wje-icon>
          </wje-option>
          <wje-option value="option-3" selected>Option 3</wje-option>
          <wje-option value="option-4" selected>Option 4</wje-option>
          <wje-option value="option-5" selected>Option 5</wje-option>
          <wje-option value="option-6">Option 6</wje-option>
        </wje-select>
      </div>
    </div>
  </body>
</html>
