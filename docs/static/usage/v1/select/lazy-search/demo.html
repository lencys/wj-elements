<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProgressBar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; justify-content: flex-start; margin-bottom: 20%; min-width: 60%" >
        <wje-select lazy placeholder="Select options" max-options="1" variant="standard" max-height="200px" find multiple clearable>
          <wje-options lazy url="/api/options" item-value="value" item-text="label" lazy-load-size="6" option-array-path="data"></wje-options>
        </wje-select>
        <wje-select placeholder="Select options" variant="standard" max-height="200px" find clearable>
          <wje-options url="/api/options" item-value="value" item-text="label" lazy-load-size="6" option-array-path="data"></wje-options>
        </wje-select>
        <wje-select label="Label" placeholder="Select options" max-options="1" max-height="200px" find multiple clearable>
          <wje-options url="/api/options" item-value="value" item-text="label" lazy-load-size="6" option-array-path="data"></wje-options>
        </wje-select>
        <wje-select label="Label" placeholder="Select options" max-height="200px" find clearable>
          <wje-options url="/api/options" item-value="value" item-text="label" lazy-load-size="6" option-array-path="data"></wje-options>
        </wje-select>
      </div>
    </div>
  </body>
</html>
