<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      .content {
        max-width: 400px;
        margin: 0 auto;
        display: flex;
      }
      #example-gap div {
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        color: var(--wje-color-white);
        background: var(--wje-color-danger);
      }
    </style>
  </head>
  <body>
    <div class="playground" style="padding-inline: 1rem">
      <div class="content">
        <wje-masonry cols="2" gap="2" class="example" id="example-gap">
          <div style="height: 300px">1</div>
          <div style="height: 375px">2</div>
          <div style="height: 250px">3</div>
          <div style="height: 377px">4</div>
          <div style="height: 200px">5</div>
        </wje-masonry>
      </div>
    </div>
  </body>
</html>
