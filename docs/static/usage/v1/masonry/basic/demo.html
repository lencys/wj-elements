<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Masonry</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
    <style>
        .content {
            max-width: 400px;
            margin: 0 auto;display: flex;
        }
        .example div {
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            color: var(--wj-color-black);
            background: var(--wj-color-warning);
        }
    </style>
  </head>
  <body>
    <div class="playground" style="padding-inline: 1rem;">
      <div class="content">
        <wj-masonry cols="2" class="example">
          <div style="height: 300px">1</div>
          <div style="height: 375px">2</div>
          <div style="height: 250px">3</div>
          <div style="height: 390px">4</div>
          <div style="height: 200px">5</div>
        </wj-masonry>
      </div>
    </div>
  </body>
</html>
