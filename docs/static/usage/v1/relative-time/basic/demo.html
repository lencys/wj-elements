<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Relative Time</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; flex-direction: column; gap: 10px;">
        <b>No date</b>
        <wje-relative-time></wje-relative-time>

        <b>Timestamp</b>
        <wje-relative-time date="1704067200"></wje-relative-time>

        <b>ISO Date</b>
        <wje-relative-time date="2024-01-01T00:00:00+00:00"></wje-relative-time>

        <b>ISO Date - Slovak</b>
        <wje-relative-time date="2024-01-01T00:00:00+00:00" lang="sk-sk"></wje-relative-time>

        <b>Invalid Date</b>
        <wje-relative-time date="Invalid Date"></wje-relative-time>
      </div>
    </div>
  </body>
</html>
