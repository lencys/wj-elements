<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Badge</title>
    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
/img/demos/avatar.svg
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-list>
          <wje-item>
            <wje-label>Default</wje-label>
            <wje-badge>22k</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Followers</wje-label>
            <wje-badge color="primary">22k</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Likes</wje-label>
            <wje-badge color="complete">118k</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Completed</wje-label>
            <wje-badge color="success">34k</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Stars</wje-label>
            <wje-badge color="warning">80</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Warnings</wje-label>
            <wje-badge color="danger">70</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Notifications</wje-label>
            <wje-badge color="info">1000</wje-badge>
          </wje-item>
          <wje-item>
            <wje-label>Notifications</wje-label>
            <wje-badge color="menu">1000</wje-badge>
          </wje-item>
        </wje-list>
      </div>
    </div>
  </body>
</html>
