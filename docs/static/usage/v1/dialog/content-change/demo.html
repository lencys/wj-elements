<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div id="open-modal-button" dialog="open-modal-div"><p>Open</p></div>
        <wje-dialog trigger="open-modal-div" headline="Title" async>
          <h4>Lorem ipsum dolor sit amet</h4>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam non vulputate velit, at volutpat nisl.</p>
          <div slot="footer">
            <wje-button class="close">Zatvoriť</wje-button>
            <wje-button id="save" color="primary">Potvrdiť</wje-button>
          </div>
        </wje-dialog>
        <script>
          let customButton = document.querySelector('#open-modal-button');

          customButton.addEventListener('click', function (e) {
            const customEvent = new CustomEvent(this.getAttribute('dialog'), {
              bubbles: true,
              composed: true
            });
            this.dispatchEvent(customEvent);
          });

          document.querySelector('[trigger=open-modal-div]').beforeOpen = async (element) => {
            const date = new Date().toLocaleString();
            element.innerHTML = 'Changed content' + date;
          };
        </script>
      </div>
    </div>
  </body>
</html>
