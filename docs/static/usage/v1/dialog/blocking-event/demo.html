<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button dialog="open-modal-blocking-event">Open</wje-button>
        <wje-dialog trigger="open-modal-blocking-event" headline="Title">
          <h4>Lorem ipsum dolor sit amet</h4>
          <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nam non vulputate velit, at volutpat nisl.</p>
          <div slot="footer">
            <wje-button class="close">Zatvoriť</wje-button>
            <wje-button id="save-blocking-event" color="primary">Potvrdiť</wje-button>
          </div>
        </wje-dialog>
        <script>
          const data = {
            id: 1,
            name: 'John Doe'
          };

          function save(data) {
            return new Promise((resolve) => {
              setTimeout(() => {
                resolve(data);
              }, 1000);
            });
          }

          window.addEventListener('load', () => {
            document.querySelector('[trigger="open-modal-blocking-event"]').registerBlockingEvent(
                document.querySelector("#save-blocking-event"),
                () => save(data)
            );
          });
        </script>
      </div>
    </div>
  </body>
</html>
