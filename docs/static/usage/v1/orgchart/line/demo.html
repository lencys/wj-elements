<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-orgchart id="line">
          <wje-orgchart-item>
            Parent
            <wje-orgchart slot="child">
              <wje-orgchart-item>
                Child
                <wje-orgchart slot="child">
                  <wje-orgchart-item>
                    A
                    <wje-orgchart slot="child">
                      <wje-orgchart-group title="Team">
                        <wje-orgchart-item>A1</wje-orgchart-item>
                        <wje-orgchart-item>A2</wje-orgchart-item>
                        <wje-orgchart-item>A3</wje-orgchart-item>
                        <wje-orgchart-item>A4</wje-orgchart-item>
                        <wje-orgchart-item>A5</wje-orgchart-item>
                        <wje-orgchart-item>A6</wje-orgchart-item>
                      </wje-orgchart-group>
                    </wje-orgchart>
                  </wje-orgchart-item>
                </wje-orgchart>
              </wje-orgchart-item>
            </wje-orgchart>
          </wje-orgchart-item>
        </wje-orgchart>
      </div>
    </div>
  </body>
</html>
<script>
  document.querySelector('#line wje-orgchart-group').addEventListener('wje-orgchart-group:click', (e) => {
    console.log('wje-orgchart-group', e.detail);
  });
</script>
