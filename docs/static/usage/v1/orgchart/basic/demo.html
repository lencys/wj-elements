<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-orgchart>
          <wje-orgchart-item boss>
            Parent
            <wje-orgchart slot="child">
              <wje-orgchart-item>
                Child
                <wje-orgchart slot="child">
                  <wje-orgchart-item>
                    A
                    <wje-orgchart slot="child">
                      <wje-orgchart-item>A1</wje-orgchart-item>
                      <wje-orgchart-item>A2</wje-orgchart-item>
                    </wje-orgchart>
                  </wje-orgchart-item>
                  <wje-orgchart-item>
                    B
                    <wje-orgchart slot="child">
                      <wje-orgchart-item>B1</wje-orgchart-item>
                      <wje-orgchart-item>B2</wje-orgchart-item>
                    </wje-orgchart>
                  </wje-orgchart-item>

                </wje-orgchart>
              </wje-orgchart-item>
            </wje-orgchart>
          </wje-orgchart-item>
        </wje-orgchart>
      </div>
    </div>
  </body>
</html>
