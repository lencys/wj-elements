<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QR Code</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/wje-master.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-orgchart>
          <wje-orgchart-item>
            Parent
            <wje-orgchart slot="child">
              <wje-orgchart-item>
                Child
                <wje-orgchart slot="child">
                  <wje-orgchart-item>
                    A
                    <wje-orgchart slot="child">
                      <wje-orgchart-item>A1</wje-orgchart-item>
                      <wje-orgchart-item>A2</wje-orgchart-item>
                    </wje-orgchart>
                  </wje-orgchart-item>
                  <wje-orgchart-item>
                    B
                    <wje-orgchart slot="child">
                      <wje-orgchart-group>
                        <wje-orgchart-item>B1</wje-orgchart-item>
                        <wje-orgchart-item>B2</wje-orgchart-item>
                      </wje-orgchart-group>
                      <wje-orgchart-item>
                        B3
                        <wje-orgchart slot="child">
                          <wje-orgchart-item>
                            B3-1
                            <wje-orgchart slot="child">
                              <wje-orgchart-group>
                                <wje-orgchart-item>B3-1-1</wje-orgchart-item>
                                <wje-orgchart-item>B3-1-2</wje-orgchart-item>
                              </wje-orgchart-group>
                            </wje-orgchart>
                          </wje-orgchart-item>
                          <wje-orgchart-item>B3-2</wje-orgchart-item>
                        </wje-orgchart>
                      </wje-orgchart-item>
                    </wje-orgchart>
                  </wje-orgchart-item>
                </wje-orgchart>
              </wje-orgchart-item>
            </wje-orgchart>
          </wje-orgchart-item>
        </wje-orgchart>
      </div>
    </div>
  </body>
</html>
