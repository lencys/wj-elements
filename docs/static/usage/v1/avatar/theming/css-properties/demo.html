<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      body {
        width: 400px;
        height: 200px;
        margin: auto;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>

  <body>
    <wje-avatar id="custom" label="Lukáš Ondrejček" initials></wje-avatar>
    <style>
      wje-avatar#custom {
        --wje-avatar-width: 100px;
        --wje-avatar-height: 100px;
        --wje-avatar-font-size: 2rem;
        --wje-avatar-font-weight: 700;
        --wje-avatar-color: #000 !important;
        --wje-avatar-background-color: #ff0000 !important;
      }
    </style>
  </body>
</html>
