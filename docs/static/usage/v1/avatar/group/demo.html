<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="wje-avatar-group">
          <wje-avatar size="large">
            <wje-img src="/img/demos/avatar.svg"></wje-img>
          </wje-avatar>
          <wje-avatar size="large">
            <wje-img src="/img/demos/avatar.svg"></wje-img>
          </wje-avatar>
          <wje-avatar size="large">
            <wje-img src="/img/demos/avatar.svg"></wje-img>
          </wje-avatar>
          <style>
            .wje-avatar-group wje-avatar:not(:first-of-type) {
              margin-left: -1rem;
            }

            .wje-avatar-group wje-avatar::part(native) {
              border: solid 2px #fff;
            }
          </style>
        </div>
      </div>
    </div>
  </body>
</html>
