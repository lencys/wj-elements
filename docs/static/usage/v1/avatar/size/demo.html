<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-avatar size="small"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="medium"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="normal"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="x-large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="2x-large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="3x-large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="4x-large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
        <wje-avatar size="5x-large"><wje-img src="/img/demos/avatar.svg"></wje-img></wje-avatar>
      </div>
    </div>
  </body>
</html>
