<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-popup.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-dropdown.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-menu.min.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-avatar.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-dropdown id="custom-dropdown" placement="right-center" trigger="hover" offset="5">
          <wje-avatar label="Petr Rahman" initials slot="trigger"></wje-avatar>
          <wje-menu id="custom-menu" active>
            <h5 style="margin: 0">Petr Rahman</h5>
            <p class="hint-text">Frontend Developer</p>
            <p>Lorem ipsum dolor sit amet, consectetur adipiscing elit. Nullam in dui mauris.</p>
          </wje-menu>
        </wje-dropdown>
        <style>
          #custom-menu {
            width: 200px;
            padding: 1rem 1rem 0;
          }
        </style>
      </div>
    </div>
  </body>
</html>
