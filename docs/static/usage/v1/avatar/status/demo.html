<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-avatar label="Petr Rahman" status-placement="top-start" initials>
          <wje-status color="success" slot="status">
            <wje-icon name="check" size="2x-small"></wje-icon>
          </wje-status>
                </wje-avatar>
                <wje-avatar label="Petr Rahman" status-placement="top-end" initials>
          <wje-status color="success" slot="status">
            <wje-icon name="check" size="2x-small"></wje-icon>
          </wje-status>
                  </wje-avatar>
                  <wje-avatar label="Petr Rahman" status-placement="bottom-start" initials>
          <wje-status color="success" slot="status">
            <wje-icon name="check" size="2x-small"></wje-icon>
          </wje-status>
                    </wje-avatar>
                    <wje-avatar label="Petr Rahman" status-placement="bottom-end" initials>
          <wje-status color="success" slot="status">
            <wje-icon name="check" size="2x-small"></wje-icon>
          </wje-status>
        </wje-avatar>
      </div>
    </div>
  </body>
</html>
