<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; min-width: 60%; margin: auto">
        <wje-item>
          <wje-label>Default Item Lines </wje-label>
        </wje-item>

        <wje-item lines="inset">
          <wje-label>Item Lines Inset</wje-label>
        </wje-item>

        <wje-item lines="full">
          <wje-label>Item Lines Full</wje-label>
        </wje-item>

        <wje-item lines="none">
          <wje-label>Item Lines None</wje-label>
        </wje-item>

        <wje-item>
          <wje-icon name="star" slot="start"></wje-icon>
          <wje-label>Default Item Lines</wje-label>
          <wje-icon name="info-circle" slot="end"></wje-icon>
        </wje-item>

        <wje-item lines="inset">
          <wje-icon name="star" slot="start"></wje-icon>
          <wje-label>Item Lines Inset</wje-label>
          <wje-icon name="info-circle" slot="end"></wje-icon>
        </wje-item>

        <wje-item lines="full">
          <wje-icon name="star" slot="start"></wje-icon>
          <wje-label>Item Lines Full</wje-label>
          <wje-icon name="info-circle" slot="end"></wje-icon>
        </wje-item>

        <wje-item lines="none">
          <wje-icon name="star" slot="start"></wje-icon>
          <wje-label>Item Lines None</wje-label>
          <wje-icon name="info-circle" slot="end"></wje-icon>
        </wje-item>
      </div>
    </div>
  </body>
</html>
