<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; min-width: 60%; margin: auto">
        <wje-item>
          <wje-avatar slot="start">
            <wje-img alt="Silhouette of a person's head" src="../../../../img/demos/avatar.svg"></wje-img>
          </wje-avatar>
          <wje-label> Avatar Item </wje-label>
        </wje-item>

        <wje-item>
          <wje-thumbnail slot="start">
            <wje-img alt="Silhouette of mountains" src="../../../../img/demos/thumbnail.svg"></wje-img>
          </wje-thumbnail>
          <wje-label> Thumbnail Item </wje-label>
        </wje-item>
      </div>
    </div>
  </body>
</html>
