<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; min-width: 60%; margin: auto">
        <wje-item>
          <wje-avatar slot="start">
            <wje-img alt="Silhouette of a person's head" src="../../../../img/demos/avatar.svg"></wje-img>
          </wje-avatar>
          <wje-label> Avatar Item </wje-label>
        </wje-item>

        <wje-item>
          <wje-thumbnail slot="start">
            <wje-img alt="Silhouette of mountains" src="../../../../img/demos/thumbnail.svg"></wje-img>
          </wje-thumbnail>
          <wje-label> Thumbnail Item </wje-label>
        </wje-item>
      </div>
    </div>
  </body>
</html>
