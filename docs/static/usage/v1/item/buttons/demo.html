<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; min-width: 60%; margin: auto">
        <wje-item>
          <wje-button slot="start"> Start </wje-button>
          <wje-label>Default Buttons</wje-label>
          <wje-button slot="end"> End </wje-button>
        </wje-item>

        <wje-item>
          <wje-button slot="start">
            Start
            <wje-icon name="home" slot="end"></wje-icon>
          </wje-button>
          <wje-label>Buttons with Icons</wje-label>
          <wje-button slot="end">
            <wje-icon name="star" slot="end"></wje-icon>
            End
          </wje-button>
        </wje-item>

        <wje-item>
          <wje-button slot="start">
            <wje-icon slot="icon-only" name="user"></wje-icon>
          </wje-button>
          <wje-label>Icon only Buttons</wje-label>
          <wje-button slot="end">
            <wje-icon slot="icon-only" name="star"></wje-icon>
          </wje-button>
        </wje-item>

        <wje-item>
          <wje-label>Button Sizes</wje-label>
          <wje-button slot="end" size="small"> Small </wje-button>
          <wje-button slot="end" size="default"> Default </wje-button>
          <wje-button slot="end" size="large"> Large </wje-button>
        </wje-item>
      </div>
    </div>
  </body>
  <style>
    wje-button {
      margin: 0.25rem;
    }
  </style>
</html>
