<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; min-width: 60%; margin: auto">
        <wje-item>
          <wje-label>Default Icon</wje-label>
          <wje-icon name="info-circle" slot="end"></wje-icon>
        </wje-item>

        <wje-item>
          <wje-label>Large Icon</wje-label>
          <wje-icon name="info-circle" size="large" slot="end"></wje-icon>
        </wje-item>

        <wje-item>
          <wje-label>Small Icon</wje-label>
          <wje-icon name="info-circle" size="small" slot="end"></wje-icon>
        </wje-item>

        <wje-item>
          <wje-icon name="star" slot="start"></wje-icon>
          <wje-label>Default Icon</wje-label>
        </wje-item>
      </div>
    </div>
  </body>
</html>
