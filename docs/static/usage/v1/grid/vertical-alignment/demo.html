<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="content">
          <span>Stĺpce zarovnané nahor</span>
          <wje-grid>
            <wje-row class="wje-align-items-start">
              <wje-col> 1 </wje-col>
              <wje-col> 2 </wje-col>
              <wje-col> 3 </wje-col>
              <wje-col>
                4 <br />
                # <br />
                # <br />
                # <br />
              </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané na stred</span>
          <wje-grid>
            <wje-row class="wje-align-items-center">
              <wje-col> 1 </wje-col>
              <wje-col> 2 </wje-col>
              <wje-col> 3 </wje-col>
              <wje-col>
                4 <br />
                # <br />
                # <br />
                # <br />
              </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané nadol</span>
          <wje-grid>
            <wje-row class="wje-align-items-end">
              <wje-col> 1 </wje-col>
              <wje-col> 2 </wje-col>
              <wje-col> 3 </wje-col>
              <wje-col>
                4 <br />
                # <br />
                # <br />
                # <br />
              </wje-col>
            </wje-row>
          </wje-grid>
        </div>
      </div>
    </div>
  </body>
  <style>
    .content {
      width: 400px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    }
    wje-col {
      background-color: #7252D3;
      border: solid 1px #fff;
      color: #fff;
      text-align: center;
    }
    wje-col[size="auto"], wje-col[size], wje-col[offset]  {
      background-color: #19AD79;
    }
    span {
      text-align: center;
    }
  </style>
</html>
