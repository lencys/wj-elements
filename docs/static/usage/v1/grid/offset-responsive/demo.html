<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="content">
          <span>Žiadny offset pre breakpoint xs, posun 1. stĺpca pre sm a vyššie</span>
          <wje-grid>
            <wje-row>
              <wje-col offset-sm="2">1</wje-col>
              <wje-col>2</wje-col>
              <wje-col>3</wje-col>
              <wje-col>4</wje-col>
              <wje-col>5</wje-col>
            </wje-row>
          </wje-grid>
  
          <span>Žiadny offset pre breakpoint xs, offset posledných 3 stĺpcov pre md a vyššie</span>
          <wje-grid>
            <wje-row>
              <wje-col>1</wje-col>
              <wje-col offset-md="2">2</wje-col>
              <wje-col offset-md="2">3</wje-col>
              <wje-col offset-md="2">4</wje-col>
            </wje-row>
          </wje-grid>
  
          <span>Offset všetkých stĺpcov o 6 pre breakpoint xs, offset o 4 pre md, offset o 2 pre lg a vyššie</span>
          <wje-grid>
            <wje-row wrap>
              <wje-col offset="6" offset-md="4" offset-lg="2">1</wje-col>
              <wje-col offset="6" offset-md="4" offset-lg="2">2</wje-col>
            </wje-row>
          </wje-grid>
        </div>
      </div>
    </div>
  </body>
  <style>
    .content {
      width: 400px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    }
    wje-col {
      background-color: #7252D3;
      border: solid 1px #fff;
      color: #fff;
      text-align: center;
    }
    wje-col[size="auto"], wje-col[size], wje-col[offset]  {
      background-color: #19AD79;
    }
    span {
      text-align: center;
    }
  </style>
</html>
