<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Order responsive</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <span>Zmeníme poradie stĺpcov pomocou <strong>order</strong> z 3 2 1 na 1 2 3</span>
        <wje-grid>
          <wje-row>
            <wje-col order="3">3</wje-col>
            <wje-col order="2">2</wje-col>
            <wje-col order="1">1</wje-col>
          </wje-row>
        </wje-grid>

        <span>Stĺpec 2 presunieme na poziciu 4 a column 3 na poziciu 5</span>
        <wje-grid>
          <wje-row>
            <wje-col>1</wje-col>
            <wje-col order="4">2</wje-col>
            <wje-col order="5">3</wje-col>
            <wje-col>4</wje-col>
            <wje-col>5</wje-col>
            <wje-col>6</wje-col>
          </wje-row>
        </wje-grid>
      </div>
    </div>
  </body>
  <style>
    .content {
      width: 400px;
      margin: auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
    }
    wje-col {
      background-color: #7252d3;
      border: solid 1px #fff;
      color: #fff;
      text-align: center;
    }
    wje-col[size='auto'],
    wje-col[size],
    wje-col[offset] {
      background-color: #19ad79;
    }
    span {
      text-align: center;
    }
  </style>
</html>
