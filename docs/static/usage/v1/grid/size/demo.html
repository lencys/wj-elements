<!DOCTYPE html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="content">
          <span>Slĺpec 2 má <strong>size</strong> <strong>"8"</strong></span>
          <wje-grid>
            <wje-row>
              <wje-col>1</wje-col>
              <wje-col size="8">2</wje-col>
              <wje-col>3</wje-col>
            </wje-row>
          </wje-grid>
  
          <span>Stĺpce 3 & 4 majú <strong>size</strong> <strong>"3"</strong></span>
          <wje-grid>
            <wje-row>
              <wje-col>1</wje-col>
              <wje-col>2</wje-col>
              <wje-col size="3">3</wje-col>
              <wje-col size="3">4</wje-col>
              <wje-col>5</wje-col>
              <wje-col>6</wje-col>
            </wje-row>
          </wje-grid>
  
          <span>Stĺpce 1 & 2 majú <strong>size</strong> nastavenú na <strong>"4"</strong></span>
          <wje-grid>
            <wje-row>
              <wje-col size="4">1</wje-col>
              <wje-col size="4">2</wje-col>
            </wje-row>
          </wje-grid>
        </div>
      </div>
    </div>
  </body>
  <style>
    .content {
      width: 400px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    }
    wje-col {
      background-color: #7252D3;
      border: solid 1px #fff;
      color: #fff;
      text-align: center;
    }
    wje-col[size="auto"], wje-col[size], wje-col[offset]  {
      background-color: #19AD79;
    }
    span {
      text-align: center;
    }
  </style>
</html>
