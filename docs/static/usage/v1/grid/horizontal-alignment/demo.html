<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="content">
          <span>Columns aligned at the start</span>
          <wje-grid>
            <wje-row class="wje-justify-content-start">
              <wje-col size="3"> 1 </wje-col>
              <wje-col size="3"> 2 </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané na stred</span>
          <wje-grid>
            <wje-row class="wje-justify-content-center">
              <wje-col size="3"> 1 </wje-col>
              <wje-col size="3"> 2 </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané na koniec</span>
          <wje-grid>
            <wje-row class="wje-justify-content-end">
              <wje-col size="3"> 1 </wje-col>
              <wje-col size="3"> 2 </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané so space-around</span>
          <wje-grid>
            <wje-row class="wje-justify-content-around">
              <wje-col size="3"> 1 </wje-col>
              <wje-col size="3"> 2 </wje-col>
            </wje-row>
          </wje-grid>
          
          <span>Stĺpce zarovnané so space-between</span>
          <wje-grid>
            <wje-row class="wje-justify-content-between">
              <wje-col size="3"> 1 </wje-col>
              <wje-col size="3"> 2 </wje-col>
            </wje-row>
          </wje-grid>
        </div>
      </div>
    </div>
  </body>
  <style>
    .content {
      width: 400px;
    margin: auto;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    }
    wje-col {
      background-color: #7252D3;
      border: solid 1px #fff;
      color: #fff;
      text-align: center;
    }
    wje-col[size="auto"], wje-col[size], wje-col[offset]  {
      background-color: #19AD79;
    }
    span {
      text-align: center;
    }
  </style>
</html>
