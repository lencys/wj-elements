<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
        <div class="content style" style="display: flex; align-items: center;">
          <wje-icon name="alarm" size="large"></wje-icon>
          <wje-icon name="alarm" size="large" filled></wje-icon>
          <style>
              .style wje-icon:not([filled])::part(svg) {
                  color: yellow;
              }
              .style wje-icon[filled]::part(svg) {
                  fill: red;
              }
          </style>
      </div>
    </div>
  </body>
</html>
