<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reorder</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-button fill="link" toggle="off" value="off" id="remove-locked">
          <span slot="toggle">Locked</span>
          <span slot="toggle">Unlocked</span>
        </wje-button>
        <wje-menu id="parent" active>
          <wje-menu-item>
            <div slot="start">
              <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item">
                <wje-icon name="arrows-move"></wje-icon>
              </wje-reorder-handle>
              Item 1
            </div>
          </wje-menu-item>
          <wje-menu-item>
            <div slot="start">
              <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item">
                <wje-icon name="arrows-move"></wje-icon>
              </wje-reorder-handle>
              Item 2
            </div>
          </wje-menu-item>
          <wje-menu-item>
            <div slot="start">
              <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item">
                <wje-icon name="arrows-move"></wje-icon>
              </wje-reorder-handle>
              Item 3
            </div>
          </wje-menu-item>
          <wje-menu-item>
            <div slot="start">
              <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item">
                <wje-icon name="arrows-move"></wje-icon>
              </wje-reorder-handle>
              Item 4
            </div>
          </wje-menu-item>
        </wje-menu>
      </div>
    </div>
  </body>
<script>
  document.querySelector('#remove-locked').addEventListener('wje-button:click', (e) => {
    document.querySelectorAll('#parent wje-reorder-handle').forEach((item) => {
      e.target.value === 'on' ? item.removeAttribute('locked') : item.setAttribute('locked', '');
    });
  });
</script>
</html>
