<!doctype html>
<html lang="en-gb">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reorder</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
</head>

<body>
<div class="container">
    <div class="content">
        <wje-menu active>
            <wje-menu-item>
                <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item" slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 1
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle dropzone="wje-menu" slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 2
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 3 (no dropzone)
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 4 (no dropzone)
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 5 (no dropzone)
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle dropzone="wje-menu" parent="wje-menu-item" slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Item 6
            </wje-menu-item>
            <wje-menu-item>
                <wje-reorder-handle dropzone="wje-menu" slot="start">
                    <wje-icon name="arrows-move"></wje-icon>
                </wje-reorder-handle>
                Submenu item
                <wje-menu slot="submenu">
                    <wje-menu-item>Menu item</wje-menu-item>
                    <wje-menu-item>Submenu item</wje-menu-item>
                </wje-menu>
            </wje-menu-item>
        </wje-menu>
    </div>
</div>
</body>
<script>
    document.querySelector('#remove-locked').addEventListener('wje-button:click', (e) => {
        document.querySelectorAll('#parent wje-reorder-handle').forEach((item) => {
            e.target.value === 'on' ? item.removeAttribute('locked') : item.setAttribute('locked', '');
        });
    });
</script>
</html>
