<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormatDigital</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
    <style>
      .content {
        max-width: 400px;
        min-width: 320px;
      }

      wje-input {
        width: 200px;
        margin-inline: 0 0.5rem;
        --wje-input-margin-bottom: 0;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; justify-content: start; align-items: center">
        <wje-input type="number" variant="standard" placeholder="Typing number" value="1000000"></wje-input>
        <wje-format-digital value="1000000" class="example"></wje-format-digital>
      </div>
    </div>
    <script>
      document.addEventListener('wje-input:input', (e) => {
        document.querySelector('.example').setAttribute('value', e.detail.value);
      });
    </script>
  </body>
</html>
