<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FormatDigital</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block;">
        <wje-format-digital value="9900"></wje-format-digital>
        <b>short</b><wje-format-digital value="9900" unit-display="short"></wje-format-digital>
        <b>narrow</b><wje-format-digital value="9900" unit-display="narrow"></wje-format-digital>
        <b>long</b><wje-format-digital value="9900" unit-display="long"></wje-format-digital>
      </div>
    </div>
  </body>
</html>
