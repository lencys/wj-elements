<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; max-width: 60%; margin: auto">
        <wje-container vertical>
          <wje-header>Header</wje-header>
          <wje-main>Main</wje-main>
        </wje-container>

        <wje-container vertical>
          <wje-header>Header</wje-header>
          <wje-main>Main</wje-main>
          <wje-footer>Footer</wje-footer>
        </wje-container>

        <wje-container>
          <wje-aside width="200px">Aside</wje-aside>
          <wje-main>Main</wje-main>
        </wje-container>

        <wje-container vertical>
          <wje-header>Header</wje-header>
          <wje-container>
            <wje-aside width="200px">Aside</wje-aside>
            <wje-main>Main</wje-main>
          </wje-container>
        </wje-container>

        <wje-container vertical>
          <wje-header>Header</wje-header>
          <wje-container>
            <wje-aside width="200px">Aside</wje-aside>
            <wje-container vertical>
              <wje-main>Main</wje-main>
              <wje-footer>Footer</wje-footer>
            </wje-container>
          </wje-container>
        </wje-container>

        <wje-container>
          <wje-aside width="200px">Aside</wje-aside>
          <wje-container vertical>
            <wje-header>Header</wje-header>
            <wje-main>Main</wje-main>
          </wje-container>
        </wje-container>

        <wje-container>
          <wje-aside width="200px">Aside</wje-aside>
          <wje-container vertical>
            <wje-header>Header</wje-header>
            <wje-container>
              <wje-aside width="200px">Aside</wje-aside>
              <wje-aside width="200px">Aside</wje-aside>
              <wje-main>Main</wje-main>
            </wje-container>
            <wje-footer>Footer</wje-footer>
          </wje-container>
        </wje-container>
        <style>
          .content {
            display: block;
            width: 100%;
            margin: auto 3rem;
          }

          .content wje-header,
          .content wje-footer {
            background-color: #b3c0d1;
            color: #333;
            text-align: center;
            line-height: 60px;
          }

          .content wje-aside {
            background-color: #d3dce6;
            color: #333;
            text-align: center;
            line-height: 200px;
            width: 60px;
            display: block !important;
          }

          .content wje-main {
            background-color: #e9eef3;
            color: #333;
            text-align: center;
          }

          /* Margin na spodok prveho containeru */
          .content > wje-container {
            margin-bottom: 40px;
          }

          .content wje-container:nth-child(5) wje-aside,
          .content wje-container:nth-child(6) wje-aside {
            line-height: 260px;
          }

          .content wje-container:nth-child(7) wje-aside {
            line-height: 320px;
          }
        </style>
      </div>
    </div>
  </body>
</html>
