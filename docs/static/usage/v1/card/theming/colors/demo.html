<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>

    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

    <style>
      .content {
        display: flex;
        flex-wrap: wrap;
      }
      wje-card {
        flex: 1 1 28%;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content">
        <style>
          .content wje-card {
            --wje-card-margin-top: 1rem;
            --wje-card-margin-bottom: 1rem;
            --wje-card-margin-inline: 1rem;
          }
        </style>
        <wje-card color="primary">
          <wje-card-header>
            <wje-card-subtitle>Primary</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="complete">
          <wje-card-header>
            <wje-card-subtitle>Complete</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="success">
          <wje-card-header>
            <wje-card-subtitle>Success</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="warning">
          <wje-card-header>
            <wje-card-subtitle>Warning</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="danger">
          <wje-card-header>
            <wje-card-subtitle>Danger</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="info">
          <wje-card-header>
            <wje-card-subtitle>Info</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>

        <wje-card color="menu">
          <wje-card-header>
            <wje-card-subtitle>Menu</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Content </wje-card-content>
        </wje-card>
      </div>
    </div>
  </body>
</html>
