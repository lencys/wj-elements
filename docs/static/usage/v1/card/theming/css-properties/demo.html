<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <link rel="stylesheet" href="../../../../common.css" />
    <script src="../../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-card id="custom">
          <wje-card-header>
            <wje-card-subtitle>Subtitle</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content> Lorem ipsum dolor sit amet, consectetur adipiscing elit. </wje-card-content>
        </wje-card>
        <style>
          #custom {
            --wje-card-margin-top: 1rem;
            --wje-card-margin-bottom: 1rem;
            --wje-card-margin-inline: 1rem;
            --wje-color-contrast: #f0f;
            --wje-card-border-color: #000;
            --wje-border-size: 2px;
            --background-color: #000 !important;
            --wje-font-size: 0.8rem;
            --wje-border-radius: 0;
          }
        </style>
      </div>
    </div>
  </body>
</html>
