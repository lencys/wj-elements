<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      wje-card {
        --wje-card-margin-inline: 1rem;
      }
      .container {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <wje-card label="Card with actions" style="width: min(100%, 360px);">
        <wje-card-header>
          <wje-card-title>Card Title</wje-card-title>
          <wje-card-subtitle>Card Subtitle</wje-card-subtitle>
        </wje-card-header>

        <wje-card-content>
          Here's a small text description for the card content. Nothing more, nothing less.

          <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
            <wje-button fill="link">Action 1</wje-button>
            <wje-button fill="link">Action 2</wje-button>
          </div>
        </wje-card-content>
      </wje-card>
    </div>
  </body>
</html>
