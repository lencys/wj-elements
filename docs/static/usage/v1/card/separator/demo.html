<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      wje-card {
        --wje-card-margin-inline: 1rem;
      }
      .content {
        max-width: 400px;
        margin: 0 auto;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-card>
          <wje-card-header separator>
            <wje-card-subtitle>Subtitle</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
            <wje-card-controls>
              <wje-button fill="link" size="small">
                <wje-icon name="arrows-diagonal" slot="icon-only"></wje-icon>
              </wje-button>
              <wje-button fill="link" size="small">
                <wje-icon name="chevron-up" slot="icon-only"></wje-icon>
              </wje-button>
              <wje-button fill="link" size="small">
                <wje-icon name="rotate-clockwise" slot="icon-only"></wje-icon>
              </wje-button>
              <wje-button fill="link" size="small">
                <wje-icon name="dots" slot="icon-only"></wje-icon>
              </wje-button>
              <wje-button fill="link" size="small">
                <wje-icon name="x" slot="icon-only"></wje-icon>
              </wje-button>
            </wje-card-controls>
          </wje-card-header>
          <wje-card-content> Lorem ipsum dolor sit amet, consectetur adipiscing elit. </wje-card-content>
        </wje-card>
      </div>
    </div>
  </body>
</html>
