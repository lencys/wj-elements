<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Card</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
    <style>
      .content {
        max-width: 400px;
        margin: 0 auto;
        min-width: 300px;
      }
      wje-card {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="content">
        <wje-card>
          <wje-card-header>
            <wje-card-subtitle>Subtitle</wje-card-subtitle>
            <wje-card-title>Title</wje-card-title>
          </wje-card-header>
          <wje-card-content>
            <wje-list>
              <wje-item>
                <wje-thumbnail slot="start">
                  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
                </wje-thumbnail>
                <wje-label>Item</wje-label>
              </wje-item>

              <wje-item>
                <wje-thumbnail slot="start">
                  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
                </wje-thumbnail>
                <wje-label>Item</wje-label>
              </wje-item>

              <wje-item>
                <wje-thumbnail slot="start">
                  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
                </wje-thumbnail>
                <wje-label>Item</wje-label>
              </wje-item>

              <wje-item lines="none">
                <wje-thumbnail slot="start">
                  <img alt="Silhouette of mountains" src="https://ionicframework.com/docs/img/demos/thumbnail.svg" />
                </wje-thumbnail>
                <wje-label>Item</wje-label>
              </wje-item>
            </wje-list>
          </wje-card-content>
        </wje-card>
      </div>
    </div>
  </body>
</html>
