<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="./https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 80%; margin: auto">
        <wje-grid>
          <wje-row>
            <wje-col>
              <wje-slider color="primary" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="complete" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="success" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="warning" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="danger" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="dark" value="50"></wje-slider>
            </wje-col>
            <wje-col>
              <wje-slider color="light" value="50"></wje-slider>
            </wje-col>
          </wje-row>
        </wje-grid>
      </div>
    </div>
  </body>
</html>
