<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/wje-master.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-menu active style="width: calc(200px - 2rem); --wje-menu-padding-inline: 1rem">
          <wje-menu-item>
            Menu item
            <wje-icon slot="start" name="home"></wje-icon>
          </wje-menu-item>
          <wje-menu-item>
            Menu item
            <wje-icon slot="end" name="heart"></wje-icon>
          </wje-menu-item>
          <wje-divider style="--wje-divider-spacing: 0.5rem"></wje-divider>
          <wje-menu-item>Menu item</wje-menu-item>
          <wje-menu-item checked>Menu item</wje-menu-item>
          <wje-menu-item>Menu item</wje-menu-item>
          <wje-divider style="--wje-divider-spacing: 0.5rem"></wje-divider>
          <wje-menu-item>
            Menu item
            <wje-menu variant="NAV" slot="submenu">
              <wje-menu-item>Menu item</wje-menu-item>
              <wje-menu-item>
                Menu item
                <wje-menu slot="submenu">
                  <wje-menu-item>Menu item</wje-menu-item>
                  <wje-menu-item>Menu item</wje-menu-item>
                  <wje-menu-item>Menu item</wje-menu-item>
                </wje-menu>
              </wje-menu-item>
              <wje-menu-item>Menu item</wje-menu-item>
            </wje-menu>
          </wje-menu-item>
          <wje-menu-item id="transformations">
            Menu item
            <wje-menu slot="submenu">
              <wje-menu-item>Menu item</wje-menu-item>
              <wje-menu-item>Menu item</wje-menu-item>
              <wje-menu-item>Menu item</wje-menu-item>
            </wje-menu>
          </wje-menu-item>
        </wje-menu>
      </div>
    </div>
  </body>
</html>
