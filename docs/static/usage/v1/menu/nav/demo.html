<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Menu</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/wje-master.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.172/dist/styles.css" />
  </head>
  <body>
    <div class="container" style="display: block;">
      <div class="content" style="max-width: 100%;height: 100%;">
        <wje-menu id="custom-1" variant="nav" active>
          <wje-menu-item>
            Home
            <wje-icon slot="start" name="home"></wje-icon>
          </wje-menu-item>
          <wje-menu-item>
            One
            <wje-icon slot="start" name="heart"></wje-icon>
            <wje-menu slot="submenu" variant="nav">
              <wje-menu-item offset="10">Menu item 1</wje-menu-item>
              <wje-menu-item offset="10">
                Menu item 2
                <wje-menu slot="submenu" variant="nav">
                  <wje-menu-item offset="10">Menu item 2.1</wje-menu-item>
                  <wje-menu-item offset="10">Menu item 2.2</wje-menu-item>
                  <wje-menu-item offset="10">Menu item 2.3</wje-menu-item>
                </wje-menu>
              </wje-menu-item>
              <wje-menu-item offset="10">Menu item 3</wje-menu-item>
            </wje-menu>
          </wje-menu-item>
          <wje-menu-item>
            Two
            <wje-icon slot="start" name="map-pin"></wje-icon>
          </wje-menu-item>
          <wje-menu-item>
            <wje-icon slot="start" name="settings"></wje-icon>
            Three
          </wje-menu-item>
        </wje-menu>
      </div>
    </div>
  </body>
  <style>
    #custom-1 {
      --wje-menu-border-width: 0 1px 0 0;
      --wje-menu-border-radius: 0;
      max-width: 240px;
      --wje-menu-shadow: none;
      height: 100%;
    }
    #custom-1 wje-menu-item::part(native) {
      --wje-menu-item-padding-top: .75rem;
      --wje-menu-item-padding-bottom: .75rem;
    }
  </style>
</html>
