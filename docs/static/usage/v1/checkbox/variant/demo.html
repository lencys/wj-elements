<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; margin: auto; max-width: fit-content">
        <wje-checkbox variant="circle">Circle</wje-checkbox>
        <wje-checkbox variant="circle" checked>Circle checked</wje-checkbox>
        <wje-checkbox variant="circle" disabled>Circle disabled</wje-checkbox>
        <wje-checkbox variant="circle" checked disabled>Circle checked disabled</wje-checkbox>
        <wje-checkbox variant="circle" color="complete" checked>Circle complete checked</wje-checkbox>
        <wje-checkbox variant="circle" color="danger" indeterminate>Circle danger indeterminate</wje-checkbox>
      </div>
    </div>
  </body>
</html>
