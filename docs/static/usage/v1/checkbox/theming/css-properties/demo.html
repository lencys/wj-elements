<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox</title>

    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      ion-checkbox {
        --size: 32px;
        --checkbox-background-checked: #6815ec;
      }

      ion-checkbox::part(container) {
        border-radius: 6px;
        border: 2px solid #6815ec;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-checkbox>Themed checkbox</ion-checkbox>
        </div>
      </ion-content>
    </ion-app>
  </body>
</html>
