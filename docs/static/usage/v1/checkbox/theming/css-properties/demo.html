<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Checkbox</title>

    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
    <style>
      #custom-checkbox {
        --wje-checkbox-border-radius: 6px;
        --wje-checkbox-border-width: 2px;
        --wje-checkbox-border-style: solid;
        --wje-checkbox-border-color: #6815ec;
        --wje-checkbox-margin-inline: 0.5rem;
        color: #6815ec;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <wje-checkbox id="custom-checkbox" checked>Themed checkbox</wje-checkbox>
    </div>
  </body>
</html>
