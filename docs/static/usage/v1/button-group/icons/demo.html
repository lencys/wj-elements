<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ButtonGroup</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button-group style="margin-right: 1rem">
          <wje-tooltip content="Bold">
            <wje-button>
              <wje-icon slot="icon-only" name="bold"></wje-icon>
            </wje-button>
          </wje-tooltip>
          <wje-tooltip content="Italic">
            <wje-button>
              <wje-icon slot="icon-only" name="italic"></wje-icon>
            </wje-button>
          </wje-tooltip>
          <wje-tooltip content="Bold">
            <wje-button>
              <wje-icon slot="icon-only" name="underline"></wje-icon>
            </wje-button>
          </wje-tooltip>
        </wje-button-group>
        <wje-button-group>
          <wje-tooltip content="Align left">
            <wje-button>
              <wje-icon slot="icon-only" name="align-left"></wje-icon>
            </wje-button>
          </wje-tooltip>
          <wje-tooltip content="Align center">
            <wje-button>
              <wje-icon slot="icon-only" name="align-center"></wje-icon>
            </wje-button>
          </wje-tooltip>
          <wje-tooltip content="Align right">
            <wje-button>
              <wje-icon slot="icon-only" name="align-right"></wje-icon>
            </wje-button>
          </wje-tooltip>
          <wje-tooltip content="Align justify">
            <wje-button>
              <wje-icon slot="icon-only" name="align-justified"></wje-icon>
            </wje-button>
          </wje-tooltip>
        </wje-button-group>
      </div>
    </div>
  </body>
</html>
