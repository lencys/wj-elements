<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; justify-content: flex-start; padding-top: 2rem">
        <wje-button-group>
          <wje-button>Button</wje-button>
          <wje-button>Button</wje-button>
          <wje-dropdown placement="bottom-end" offset="5">
            <wje-button slot="trigger" caret>Dropdown</wje-button>
            <wje-menu variant="context">
              <wje-menu-item>Item 1</wje-menu-item>
              <wje-menu-item>Item 2</wje-menu-item>
              <wje-menu-item>Item 3</wje-menu-item>
            </wje-menu>
          </wje-dropdown>
        </wje-button-group>
      </div>
    </div>
  </body>
</html>
