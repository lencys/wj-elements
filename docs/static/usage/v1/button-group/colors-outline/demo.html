<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors outline</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; flex-direction: column;">
        <p>
          <wj-button-group>
            <wj-button fill="outline">Default</wj-button>
            <wj-button fill="outline">Default</wj-button>
            <wj-button fill="outline">Default</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="primary" fill="outline">Primary</wj-button>
            <wj-button color="primary" fill="outline">Primary</wj-button>
            <wj-button color="primary" fill="outline">Primary</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="complete" fill="outline">Complete</wj-button>
            <wj-button color="complete" fill="outline">Complete</wj-button>
            <wj-button color="complete" fill="outline">Complete</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="success" fill="outline">Success</wj-button>
            <wj-button color="success" fill="outline">Success</wj-button>
            <wj-button color="success" fill="outline">Success</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="warning" fill="outline">Warning</wj-button>
            <wj-button color="warning" fill="outline">Warning</wj-button>
            <wj-button color="warning" fill="outline">Warning</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="danger" fill="outline">Danger</wj-button>
            <wj-button color="danger" fill="outline">Danger</wj-button>
            <wj-button color="danger" fill="outline">Danger</wj-button>
          </wj-button-group>
        </p>
        <p>
          <wj-button-group>
            <wj-button color="neutral" fill="outline">Neutral</wj-button>
            <wj-button color="neutral" fill="outline">Neutral</wj-button>
            <wj-button color="neutral" fill="outline">Neutral</wj-button>
          </wj-button-group>
       </p>
       </div>
    </div>
  </body>
</html>
