<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Colors outline</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; flex-direction: column;">
        <p>
          <wje-button-group>
            <wje-button fill="outline">Default</wje-button>
            <wje-button fill="outline">Default</wje-button>
            <wje-button fill="outline">Default</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="primary" fill="outline">Primary</wje-button>
            <wje-button color="primary" fill="outline">Primary</wje-button>
            <wje-button color="primary" fill="outline">Primary</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="complete" fill="outline">Complete</wje-button>
            <wje-button color="complete" fill="outline">Complete</wje-button>
            <wje-button color="complete" fill="outline">Complete</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="success" fill="outline">Success</wje-button>
            <wje-button color="success" fill="outline">Success</wje-button>
            <wje-button color="success" fill="outline">Success</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="warning" fill="outline">Warning</wje-button>
            <wje-button color="warning" fill="outline">Warning</wje-button>
            <wje-button color="warning" fill="outline">Warning</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="danger" fill="outline">Danger</wje-button>
            <wje-button color="danger" fill="outline">Danger</wje-button>
            <wje-button color="danger" fill="outline">Danger</wje-button>
          </wje-button-group>
        </p>
        <p>
          <wje-button-group>
            <wje-button color="neutral" fill="outline">Neutral</wje-button>
            <wje-button color="neutral" fill="outline">Neutral</wje-button>
            <wje-button color="neutral" fill="outline">Neutral</wje-button>
          </wje-button-group>
       </p>
       </div>
    </div>
  </body>
</html>
