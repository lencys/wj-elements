<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ButtonGroup</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; justify-content: flex-start; padding-top: 2rem">
        <wje-button-group>
          <wje-button variant="primary">Save</wje-button>
          <wje-dropdown placement="bottom-end" offset="5">
            <wje-button slot="trigger" variant="primary" caret>
              <wje-visually-hidden>More options</wje-visually-hidden>
            </wje-button>
            <wje-menu variant="context">
              <wje-menu-item>Save</wje-menu-item>
              <wje-menu-item>Save as&hellip;</wje-menu-item>
              <wje-menu-item>Save all</wje-menu-item>
            </wje-menu>
          </wje-dropdown>
        </wje-button-group>
      </div>
    </div>
  </body>
</html>
