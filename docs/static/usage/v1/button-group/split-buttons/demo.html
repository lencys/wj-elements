<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ButtonGroup</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column;justify-content: flex-start; padding-top: 2rem;">
        <wj-button-group>
          <wj-button variant="primary">Save</wj-button>
          <wj-dropdown placement="bottom-end" offset="5">
            <wj-button slot="trigger" variant="primary" caret>
              <wj-visually-hidden>More options</wj-visually-hidden>
            </wj-button>
            <wj-menu variant="context">
              <wj-menu-item>Save</wj-menu-item>
              <wj-menu-item>Save as&hellip;</wj-menu-item>
              <wj-menu-item>Save all</wj-menu-item>
            </wj-menu>
          </wj-dropdown>
        </wj-button-group>
      </div>
    </div>
  </body>
</html>
