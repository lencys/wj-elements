<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Radio</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-radio-group value="complete">
          <wje-radio value="default">Default</wje-radio>
          <wje-radio value="success" color="success">Success</wje-radio>
          <wje-radio value="primary" color="primary">Primary</wje-radio>
          <wje-radio value="complete" color="complete">Complete</wje-radio>
          <wje-radio value="warning" color="warning">Warning</wje-radio>
          <wje-radio value="danger" color="danger">Danger</wje-radio>
          <wje-radio value="neutral" color="neutral">Neutral</wje-radio>
        </wje-radio-group>
      </div>
    </div>
  </body>
</html>
