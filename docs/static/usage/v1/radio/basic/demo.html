<html lang="en-gb">

    <title>Radio</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

  <body>
    <div class="container">
      <div class="content">
        <wje-radio-group value="dog">
          <wje-radio value="cat">Cat</wje-radio>

          <wje-radio value="elephant" disabled="">Elephant</wje-radio>

        </wje-radio-group>
      </div>
    </div>
