<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tooltip: Basic</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; gap: 1rem">
        <wje-tooltip content="Som najkrajsi tooltip hore" offset="2">
          <wje-button size="large">Top</wje-button>
        </wje-tooltip>

        <wje-tooltip content="Som najkrajsi tooltip dole" placement="bottom" offset="10">
          <wje-button size="large">Bottom</wje-button>
        </wje-tooltip>

        <wje-tooltip content="Som najkrajsi tooltip vlavo" placement="left" offset="10">
          <wje-button size="large">Left</wje-button>
        </wje-tooltip>

        <wje-tooltip content="Som najkrajsi tooltip vpravo" placement="right" offset="10">
          <wje-button size="large">Right</wje-button>
        </wje-tooltip>
      </div>
    </div>
  </body>
</html>
