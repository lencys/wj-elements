<!DOCTYPE html>
<html lang="en-gb">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animation</title>
  <link rel="stylesheet" href="../../../common.css" />
  <script src="../../../common.js"></script>
  <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
  <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
  <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
  <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
</head>

<body>
  <div class="playground" style="height: 100%;">
    <div class="container">
      <div class="content" style="text-align: center;">
      <wje-animation name="heartBeat" delay="500" duration="500">
        <wje-avatar>
          <wje-img src="../../../../img/demos/avatar.svg"></wje-img>
        </wje-avatar>
      </wje-animation>
      <div style="margin-top: 1rem">
        <wje-button id="stop">Stop</wje-button>
        <wje-button id="play">Play</wje-button>
      </div>
    </div>
  </div>
</body>
</html>
<script>
document.querySelector("#stop").addEventListener('click', (e) => {
  document.querySelector('wje-animation').animation.cancel();
});
document.querySelector("#play").addEventListener('click', (e) => {
  document.querySelector('wje-animation').animation.play();
});
</script>
