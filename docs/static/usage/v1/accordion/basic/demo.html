<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Accordion</title>

    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

    <style>
      [slot=headline] {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        gap: .5rem;
      }
      wje-dropdown {
        margin-left: auto;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction:  column;">
        <wje-accordion>
          <wje-accordion-item class="collapsed">
            <div slot="headline">
              <wje-status color="success" size="large">
                <wje-icon name="check" size="medium"></wje-icon>
              </wje-status>
              Headline ssss
              <wje-dropdown label="Start" placement="bottom-start" offset="5" collapsible id="custom-dropdown-basic">
                <wje-button fill="link" slot="trigger">
                  <wje-icon name="dots-vertical"></wje-icon>
                </wje-button>
                <wje-menu variant="context">
                  <wje-menu-item>
                    <wje-icon name="plane" slot="start"></wje-icon>
                    <wje-label>Menu item</wje-label>
                  </wje-menu-item>
                  <wje-menu-item>
                    <wje-icon name="book" slot="start"></wje-icon>
                    <wje-label>Menu item</wje-label>
                  </wje-menu-item>
                  <wje-menu-item>
                    <wje-icon name="music" slot="start"></wje-icon>
                    <wje-label>Menu item</wje-label>
                  </wje-menu-item>
                  <wje-menu-item>
                    <wje-icon name="video" slot="start"></wje-icon>
                    <wje-label>Menu item</wje-label>
                  </wje-menu-item>
                </wje-menu>
              </wje-dropdown>
            </div>
            <div slot="description">Lorem ipsum dolor sit amet, consectetur adipiscing.</div>
            <div slot="content">Click headers to expand/collapse content that is broken into logical sections, much like tabs. Optionally, toggle sections open/closed on mouseover.</div>
          </wje-accordion-item>
        </wje-accordion>
      </div>
    </div>
  </body>
</html>
