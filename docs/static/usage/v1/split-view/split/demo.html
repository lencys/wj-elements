<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SplitView</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 60%;margin: auto;">
        <wje-split-view initial="50">
          <div slot="start">Start</div>
          <div slot="end">
            <wje-split-view vertical id="custom-vertical-2">
              <div slot="start">Top</div>
              <div slot="end">Bottom</div>
            </wje-split-view>
          </div>
        </wje-split-view>
        <style>
          wje-split-view {
            display: block;
            height: 300px;
            width: 100%;
            border-color: var(--wje-border-color);
            border-style: solid;
            border-width: 1px;
          }
        </style>
      </div>
    </div>
  </body>
</html>
