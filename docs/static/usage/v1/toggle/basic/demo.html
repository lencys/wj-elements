<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle: Basic</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; width: 60%; margin: auto">
        <wje-item>
          <wje-toggle>Default Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle checked>Checked Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle disabled>Disabled Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle checked disabled>Disabled Checked Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="success" checked disabled>Disabled Checked Toggle</wje-toggle>
        </wje-item>
      </div>
    </div>
  </body>
</html>
