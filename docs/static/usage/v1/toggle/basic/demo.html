<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle: Basic</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block;width: 60%; margin: auto;">
        <wje-item>
          <wje-toggle>Default Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle checked>Checked Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle disabled>Disabled Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle checked disabled>Disabled Checked Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="success" checked disabled>Disabled Checked Toggle</wje-toggle>
        </wje-item>
      </div>
    </div>
  </body>
</html>
