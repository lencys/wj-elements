<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle: Colors</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; width: 60%; margin: auto">
        <wje-item>
          <wje-toggle checked>Default Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="primary" checked>Primary Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="complete" checked>Complete Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="success" checked>Success Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="warning" checked>Warning Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="danger" checked>Danger Toggle</wje-toggle>
        </wje-item>
        <wje-item>
          <wje-toggle color="dark" checked>Dark Toggle</wje-toggle>
        </wje-item>
      </div>
    </div>
  </body>
</html>
