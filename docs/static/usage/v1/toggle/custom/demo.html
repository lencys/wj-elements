<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toggle: Custom</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-toggle id="custom-toggle" checked
          >Default Toggle
          <style>
            #custom-toggle {
              --wje-toggle-color-base: #ff0000;
              --wje-toggle-width: 60px;
              --wje-toggle-height: 8px;
              --wje-toggle-border-radius: 0;
              --wje-toggle-handle-width: 20px;
              --wje-toggle-handle-height: 20px;
              --wje-toggle-handle-border-radius: 0;
              --wje-toggle-handle-color: #996633;
              --wje-toggle-handle-shadow: none !important;
              --wje-toggle-handle-shadow-checked: none !important;
            }
          </style>
        </wje-toggle>
      </div>
    </div>
  </body>
</html>
