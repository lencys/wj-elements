<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toast</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />

    <style>
      .container {
        flex-direction: column;
      }

      .container p {
        margin-bottom: 0;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-header>
        <ion-toolbar>
          <ion-title>Toast</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <div class="container">
          <ion-button id="open-toast">Open Toast</ion-button>
          <ion-toast trigger="open-toast" duration="3000" message="Hello World!"></ion-toast>
          <p id="handlerResult"></p>
          <p id="roleResult"></p>
        </div>
      </ion-content>
    </ion-app>

    <script>
      const toast = document.querySelector('ion-toast');
      const handlerOutput = document.querySelector('#handlerResult');
      const roleOutput = document.querySelector('#roleResult');

      toast.buttons = [
        {
          text: 'More Info',
          role: 'info',
          handler: () => {
            handlerOutput.innerText = 'More Info clicked';
          },
        },
        {
          text: 'Dismiss',
          role: 'cancel',
          handler: () => {
            handlerOutput.innerText = 'Dismiss clicked';
          },
        },
      ];

      toast.addEventListener('ionToastDidDismiss', (ev) => {
        const { role } = ev.detail;
        roleOutput.innerText = `Dismissed with role: ${role}`;
      });
    </script>
  </body>
</html>
