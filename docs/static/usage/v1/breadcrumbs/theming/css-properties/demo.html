<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumbs</title>
    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

    <style>
      ion-breadcrumb {
        --color: rgb(81, 155, 198);
        --color-active: rgb(150, 112, 220);
        --color-hover: rgb(103, 61, 180);
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-breadcrumbs>
            <ion-breadcrumb href="#home">Home</ion-breadcrumb>
            <ion-breadcrumb href="#electronics">Electronics</ion-breadcrumb>
            <ion-breadcrumb href="#cameras">Cameras</ion-breadcrumb>
            <ion-breadcrumb href="#film">Film</ion-breadcrumb>
          </ion-breadcrumbs>
        </div>
      </ion-content>
    </ion-app>
  </body>
</html>
