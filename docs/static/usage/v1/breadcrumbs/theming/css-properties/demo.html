<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Breadcrumbs</title>
    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

    <style>
      .breadcrumbs-custom wje-breadcrumb {
        --wje-breadcrumb-a: rgb(81, 155, 198);
        --wje-breadcrumb-a-hover: rgb(103, 61, 180);
      }
    </style>
  </head>

  <body>
    <div class="container">
      <wje-breadcrumbs class="breadcrumbs-custom">
        <wje-breadcrumb href="/home">Home</wje-breadcrumb>
        <wje-breadcrumb href="/electronics">Electronics</wje-breadcrumb>
        <wje-breadcrumb href="/cameras">Cameras</wje-breadcrumb>
        <wje-breadcrumb href="/film">Film</wje-breadcrumb>
      </wje-breadcrumbs>
    </div>
  </body>
</html>
