<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Popover</title>

    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

  </head>
  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-breadcrumbs max-items="4">
            <ion-breadcrumb href="#home">Home</ion-breadcrumb>
            <ion-breadcrumb href="#electronics">Electronics</ion-breadcrumb>
            <ion-breadcrumb href="#photography">Photography</ion-breadcrumb>
            <ion-breadcrumb href="#cameras">Cameras</ion-breadcrumb>
            <ion-breadcrumb href="#film">Film</ion-breadcrumb>
            <ion-breadcrumb href="#35mm">35 mm</ion-breadcrumb>
          </ion-breadcrumbs>
        </div>
      </ion-content>
    </ion-app>

    <script>
      const breadcrumbs = document.querySelector('ion-breadcrumbs');

      breadcrumbs.addEventListener('ionCollapsedClick', () => {
        breadcrumbs.maxItems = undefined;
      });
    </script>
  </body>
</html>
