<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Avatar</title>
    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />

    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <div class="container" style="flex-direction: column">
          <wje-label>Ikony na začiatku</wje-label>
          <wje-breadcrumbs>
            <wje-breadcrumb href="/house">
              <wje-icon slot="start" name="home"></wje-icon>
              Home
            </wje-breadcrumb>
            <wje-breadcrumb href="/electronics">
              <wje-icon slot="start" name="bolt"></wje-icon>
              Electronics
            </wje-breadcrumb>
            <wje-breadcrumb href="/cameras">
              <wje-icon slot="start" name="camera"></wje-icon>
              Cameras
            </wje-breadcrumb>
            <wje-breadcrumb href="/film">
              <wje-icon slot="start" name="video"></wje-icon>
              Film
            </wje-breadcrumb>
          </wje-breadcrumbs>

          <wje-label>Ikony na konci</wje-label>
          <wje-breadcrumbs>
            <wje-breadcrumb href="/house">
              Home
              <wje-icon slot="end" name="home"></wje-icon>
            </wje-breadcrumb>
            <wje-breadcrumb href="/electronics">
              Electronics
              <wje-icon slot="end" name="bolt"></wje-icon>
            </wje-breadcrumb>
            <wje-breadcrumb href="/cameras">
              Cameras
              <wje-icon slot="end" name="camera"></wje-icon>
            </wje-breadcrumb>
            <wje-breadcrumb href="/film">
              Film
              <wje-icon slot="end" name="video"></wje-icon>
            </wje-breadcrumb>
          </wje-breadcrumbs>
        </div>
      </div>

</html>
