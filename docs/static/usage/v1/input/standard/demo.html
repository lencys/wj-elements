<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 60%; margin: auto; display: block">
        <wje-input variant="standard" type="number" label="Default input"></wje-input>
        <wje-input variant="standard" label="Input with placeholder" placeholder="Enter company name"></wje-input>
        <wje-input variant="standard" label="Input with value" value="Mlynské Nivy 71"></wje-input>
        <wje-input variant="standard" label="Readonly input" value="Bratislava" readonly></wje-input>
        <wje-input variant="standard" label="Disabled input" value="84103" disabled></wje-input>
        <wje-input
          variant="standard"
          label="Default input"
          type="number"
          minlength="5"
          message="Toto je moja hlaska"
          required
          validate-on-change
          custom-error-display
        ></wje-input>
      </div>
    </div>
  </body>
</html>
