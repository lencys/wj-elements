<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 60%; margin: auto">
        <wje-grid>
          <wje-row class="gx-2">
            <wje-col size="6">
              <wje-input variant="standard" label="Project name"></wje-input>
            </wje-col>
            <wje-col size="6">
              <wje-input
                variant="standard"
                label="Project code"
                placeholder="6 digit code"
                minlength="6"
                maxlength="6"
                message="Toto je moja hlaska"
                validate-on-change
                custom-error-display
              ></wje-input>
            </wje-col>
          </wje-row>
          <wje-row>
            <wje-col size="12">
              <wje-input variant="standard" label="Project URL">
                <span slot="start"><wje-icon name="globe"></wje-icon></span>
                <span slot="end">.com</span>
              </wje-input>
            </wje-col>
          </wje-row>
          <wje-row class="gx-2">
            <wje-col size="6">
              <wje-input variant="standard" label="Profit">
                <span slot="end">&euro;</span>
              </wje-input>
            </wje-col>
            <wje-col size="6">
              <wje-input variant="standard" label="Email"></wje-input>
            </wje-col>
          </wje-row>
        </wje-grid>
      </div>
    </div>
  </body>
</html>
