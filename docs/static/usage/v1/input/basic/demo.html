<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block;min-width: 60%;margin: auto;">
        <wj-input label="Základný input"></wj-input>
        <wj-input label="Input s placeholderom" placeholder="Enter company name"></wj-input>
        <wj-input label="Input s predvyplnenou hodnotou" value="Mlynské Nivy 71"></wj-input>
        <wj-input label="Input iba na čítanie" value="Bratislava" readonly></wj-input>
        <wj-input label="Vypnutý input" value="84103" disabled></wj-input>
        <wj-input label="Povinný input s vlastnou chybovou hláškou" type="number" minlength="5" message="Toto je moja chybová hláška" required validate-on-change custom-error-display ></wj-input>
      </div>
    </div>
  </body>
</html>
