<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: block; min-width: 60%; margin: auto">
        <wje-input label="Základný input"></wje-input>
        <wje-input label="Input s placeholderom" placeholder="Enter company name"></wje-input>
        <wje-input label="Input s predvyplnenou hodnotou" value="Mlynské Nivy 71"></wje-input>
        <wje-input label="Input iba na čítanie" value="Bratislava" readonly></wje-input>
        <wje-input label="Vypnutý input" value="84103" disabled></wje-input>
        <wje-input
          label="Povinný input s vlastnou chybovou hláškou"
          type="number"
          minlength="5"
          message="Toto je moja chybová hláška"
          required
          validate-on-change
          custom-error-display
        ></wje-input>
      </div>
    </div>
  </body>
</html>
