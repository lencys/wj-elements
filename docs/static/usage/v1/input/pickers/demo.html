<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 60%; margin: auto; display: block">
        <wje-input variant="standard" label="Default input" class="example-icon" clearable>
          <wje-icon-picker slot="start"></wje-icon-picker>
        </wje-input>

        <wje-input variant="standard" label="Default input" class="example-color" clearable>
          <wje-color-picker slot="start"></wje-color-picker>
        </wje-input>

        <style>
          .example-icon wje-icon-picker {
            --wje-icon-picker-border-width: 0 !important;
            --wje-icon-picker-padding: 0.15rem !important;
            --wje-input-slot-padding-inline: 0.25rem !important;
          }

          .example-color wje-color-picker::part(anchor) {
            /*border-radius: 3px 0 0 3px !important;*/
            border-radius: 50%;
          }
        </style>
      </div>
    </div>
  </body>
</html>
