<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; justify-content: flex-start;display: flex;row-gap: 2rem;width: 400px;">
        <wje-divider style="--wje-divider-spacing: 1rem;"></wje-divider>
        <wje-menu active style="max-width: 200px;">
          <wje-menu-item>
            Menu item
          </wje-menu-item>
          <wje-menu-item>
            Menu item
            <wje-icon slot="end" name="heart"></wje-icon>
          </wje-menu-item>
          <wje-divider style="--wje-divider-spacing: .5rem;"></wje-divider>
          <wje-menu-item>Menu item</wje-menu-item>
          <wje-menu-item>Menu item</wje-menu-item>
        </wje-menu>
      </div>
    </div>
  </body>
</html>
