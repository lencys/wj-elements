<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolbar: Dynamic Breadcrumbs</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
    <style>
      .custom {
        --wje-icon-size: 10px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="content" style="width: 100%; margin: auto 1rem">
        <wje-toolbar>
          <wje-breadcrumbs
            slot="start"
            max-items="3"
            items-before-collapse="1"
            routerlinks
            id="custom-dynamic"
          ></wje-breadcrumbs>
          <wje-toolbar-action slot="end">
            <wje-button>Create</wje-button>
            <wje-button>Read</wje-button>
            <wje-button>Update</wje-button>
            <wje-button>Delete</wje-button>
          </wje-toolbar-action>
        </wje-toolbar>
      </div>
    </div>

    <script>
      const objs = [
        {
          name: '',
          text: '<wje-icon slot="start" name="home"></wje-icon>',
          params: {},
          path: '/',
        },
        {
          name: 'a',
          text: 'A',
          params: {},
          path: '/a',
        },
        {
          name: 'b',
          text: 'B',
          params: {},
          path: '/a/b',
        },
        {
          name: 'c',
          text: 'C',
          params: {},
          path: '/a/b/c',
        },
      ];
      const breadcrumbs = document.querySelector('#custom-dynamic');
      objs.forEach((obj) => {
        let breadcrumb = document.createElement('wje-breadcrumb');
        breadcrumb.setAttribute('route', obj.name);
        breadcrumb.innerHTML = `${obj.text}<wje-icon slot="separator" name="minus" size="small" class="custom"></wje-icon>`;
        breadcrumbs.appendChild(breadcrumb);
      });
    </script>
  </body>
</html>
