<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="max-width: 100%; margin: auto; overflow: hidden">
        <wje-infinite-scroll url="/api/users" placement="wje-row" size="20" class="example" height="440px">
          <wje-grid>
            <wje-row wrap>
              <template iterate>
                <wje-col size="6">
                  <wje-card>
                    <wje-img src="{{image}}"></wje-img>
                    <wje-card-header>
                      <wje-card-subtitle>{{jobTitle}}</wje-card-subtitle>
                      <wje-card-title>{{fullName}}</wje-card-title>
                    </wje-card-header>
                    <wje-card-content>
                      <p>{{description}}</p>
                    </wje-card-content>
                  </wje-card>
                </wje-col>
              </template>
            </wje-row>
          </wje-grid>
          <style>
            .example {
              padding: 0 1rem;
            }
          </style>
          <wje-icon name="arrow-bar-to-down" size="large" slot="ending"></wje-icon>
          <wje-icon name="loader" size="large" slot="loader"></wje-icon>
        </wje-infinite-scroll>
      </div>
    </div>
  </body>
</html>
