<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../js/demo.js"></script>
    <script type="module" src="./../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 80%; margin: auto">
        <wje-infinite-scroll url="/api/users" placement="wje-list">
          <wje-list>
            <wje-item iterate>
              <wje-label>
                <h4>{{fullName}}</h4>
                <p>{{jobTitle}}</p>
              </wje-label>
            </wje-item>
          </wje-list>
        </wje-infinite-scroll>
        <style>
          wje-infinite-scroll {
            min-width: 250px;
          }
        </style>
      </div>
    </div>
  </body>
</html>
