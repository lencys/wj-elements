<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../js/demo.js"></script>
    <!-- <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" /> -->
    <script type="module" src="./../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="./../../../../wj-elementy/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 80%;margin: auto;">
        <wj-infinite-scroll url="/api/users" placement="wj-list">
          <wj-list>
            <wj-item iterate>
              <wj-label>
                <h4>{{fullName}}</h4>
                <p>{{jobTitle}}</p>
              </wj-label>
            </wj-item>
          </wj-list>
        </wj-infinite-scroll>
        <style>
          wj-infinite-scroll {
            min-width: 250px;
          }
        </style>
      </div>
    </div>
  </body>
</html>
