<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../js/demo.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.171/dist/wje-master.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="min-width: 50%; margin: auto; overflow: hidden">
        <wje-infinite-scroll url="/api/users" placement="wje-list" id="basic">
          <wje-list>
            <template iterate>
              <wje-item>
                <wje-label>
                  <h4>{{fullName}}</h4>
                  <p>{{jobTitle}}</p>
                </wje-label>
              </wje-item>
            </template>
          </wje-list>
          <wje-icon name="arrow-bar-to-down" size="large" slot="ending"></wje-icon>
          <wje-icon name="loader" size="large" slot="loader"></wje-icon>
        </wje-infinite-scroll>
      </div>
    </div>
  </body>
</html>
