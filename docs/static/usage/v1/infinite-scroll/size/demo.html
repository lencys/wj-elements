<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../js/demo.js"></script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.171/dist/wje-master.min.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="max-width: 100%;margin: auto;overflow: hidden;min-width: 50%;">
        <wje-infinite-scroll url="/api/users" placement="wje-list" size="6">
          <wje-list>
            <template iterate>
              <wje-tooltip content="{{fullName}}">
                <wje-item>
                  <wje-label>
                    <h4>{{fullName}}</h4>
                    <p>{{jobTitle}}</p>
                  </wje-label>
                </wje-item>
              </wje-tooltip>
            </template>
          </wje-list>
        </wje-infinite-scroll>
      </div>
    </div>
  </body>
</html>
