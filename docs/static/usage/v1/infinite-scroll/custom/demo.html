<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Icon</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../js/demo.js"></script>
    <script type="module" src="./../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="max-width: 100%;margin: auto;overflow: hidden;">
        <wje-infinite-scroll url="/api/users" placement="wje-row" size="20" class="example" height="440px">
          <wje-grid>
            <wje-row wrap>
              <wje-col size="6" iterate>
                <wje-card>
                  <wje-img src="{{image}}"></wje-img>
                  <wje-card-header>
                    <wje-card-subtitle>{{jobTitle}}</wje-card-subtitle>
                    <wje-card-title>{{fullName}}</wje-card-title>
                  </wje-card-header>
                  <wje-card-content>
                    <p>{{description}}</p>
                  </wje-card-content>
                </wje-card>
              </wje-col>
            </wje-row>
          </wje-grid>
          <style>
            .example {
              min-width: 250px;
              padding: 0 1rem;
            }
          </style>
        </wje-infinite-scroll>
      </div>
    </div>
  </body>
</html>
