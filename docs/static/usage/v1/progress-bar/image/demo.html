<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProgressBar</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>

  <body>
    <div class="container">
      <div class="content" style="flex-direction: column">
        <wje-progress-bar
          progress="60"
          radius="20"
          stroke="3"
          color="danger"
          type="circle"
          shadow="open"
          class="wje-color-danger wje-color"
        >
          <wje-thumbnail circle>
            <img alt="Silhouette of mountains" src="../../../../img/demos/thumbnail.svg" />
          </wje-thumbnail>
          <style>
            wje-thumbnail {
              --wje-border-radius: 50%;
              --wje-thumbnail-width: 38px;
              --wje-thumbnail-height: 38px;
            }
          </style>
        </wje-progress-bar>
      </div>
    </div>
  </body>
</html>
