<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Action Sheet</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-button onclick="presentActionSheet()">Open</ion-button>
        </div>
      </ion-content>
    </ion-app>
    <script>
      async function presentActionSheet() {
        const actionSheet = document.createElement('ion-action-sheet');
        actionSheet.header = 'Actions';
        actionSheet.buttons = [
          {
            text: 'Delete',
            role: 'destructive',
            data: {
              action: 'delete',
            },
          },
          {
            text: 'Share',
            data: {
              action: 'share',
            },
          },
          {
            text: 'Cancel',
            role: 'cancel',
            data: {
              action: 'cancel',
            },
          },
        ];

        document.body.appendChild(actionSheet);
        await actionSheet.present();
      }
    </script>
  </body>
</html>
