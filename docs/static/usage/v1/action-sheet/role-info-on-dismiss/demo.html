<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Action Sheet</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

    <style>
      .container {
        flex-direction: column;
      }

      code {
        white-space: pre-wrap;
      }
    </style>
  </head>

  <body>
    <ion-app>
      <ion-content>
        <div class="container">
          <ion-button id="open-action-sheet">Open</ion-button>
          <ion-action-sheet
            trigger="open-action-sheet"
            header="Example header"
            sub-header="Example subheader"
          ></ion-action-sheet>

          <code id="action"></code>
        </div>
      </ion-content>
    </ion-app>
    <script>
      const actionSheet = document.querySelector('ion-action-sheet');
      const action = document.getElementById('action');

      actionSheet.buttons = [
        {
          text: 'Delete',
          role: 'destructive',
          data: {
            action: 'delete',
          },
        },
        {
          text: 'Share',
          data: {
            action: 'share',
          },
        },
        {
          text: 'Cancel',
          role: 'cancel',
          data: {
            action: 'cancel',
          },
        },
      ];

      actionSheet.addEventListener('ionActionSheetDidDismiss', (ev) => {
        action.innerText = JSON.stringify(ev.detail, null, 2);
      });
    </script>
  </body>
</html>
