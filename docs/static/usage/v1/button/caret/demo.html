<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script
        type="module"
        src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.138/dist/wje-master.min.js"
    ></script>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.138/dist/styles.min.css"
    />
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button color="default" fill="outline" size="small" caret>Small</wje-button>
        <wje-button color="default" fill="outline" caret id="caret">Default</wje-button>
        <wje-button color="default" fill="outline" size="large" caret>Large</wje-button>
        <style>
          wje-button [slot=caret] {
            margin-inline: .5rem 0;
          }
        </style>
      </div>
    </div>
  </body>
</html>
