<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>

    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />

  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button color="default" fill="outline" size="small" caret>Small</wje-button>
        <wje-button color="default" fill="outline" caret id="caret">Default</wje-button>
        <wje-button color="default" fill="outline" size="large" caret>Large</wje-button>
        <style>
          wje-button [slot=caret] {
            margin-inline: .5rem 0;
          }
        </style>
      </div>
    </div>
  </body>
</html>
