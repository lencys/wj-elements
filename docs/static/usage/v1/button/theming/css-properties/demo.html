<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>

    <script src="../../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button id="custom"
          >Custom
          <style>
            wje-button#custom {
              --wje-color-base: #000000;
              --wje-button-border-color: #0af4fc;
              --wje-button-border-radius: 0;
              --wje-color-contrast: #0af4fc;
              --wje-padding-top: 1rem;
              --wje-padding-start: 0.7rem;
              --wje-padding-end: 0.7rem;
              --wje-padding-bottom: 1rem;
            }
          </style>
        </wje-button>
      </div>
    </div>
  </body>
</html>
