<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="./../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button fill="link" toggle="off">
          <wje-icon name="sun" slot="toggle"></wje-icon>
          <wje-icon name="moon" slot="toggle"></wje-icon>
        </wje-button>

        <wje-button fill="link" toggle="off">
          <span slot="toggle">On</span>
          <span slot="toggle">Off</span>
        </wje-button>
      </div>
    </div>
  </body>
</html>
