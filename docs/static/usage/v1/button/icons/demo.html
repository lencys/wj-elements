<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wje-elementy/wje-master.js"></script>
    <link rel="stylesheet" href="../../../../wje-elementy/light.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/dark.css" />
    <link rel="stylesheet" href="../../../../wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content">
        <wje-button>
          <wje-icon slot="start" name="star"></wje-icon>
          Left Icon
        </wje-button>
        <wje-button>
          Right Icon
          <wje-icon slot="end" name="star"></wje-icon>
        </wje-button>

        <wje-button>
          <wje-icon slot="icon-only" name="star"></wje-icon>
        </wje-button>

        <wje-button fill="outline">
          <wje-icon slot="start" name="star"></wje-icon>
          Left Icon
        </wje-button>
        <wje-button fill="outline">
          Right Icon
          <wje-icon slot="end" name="star"></wje-icon>
        </wje-button>
        <wje-button fill="outline">
          <wje-icon slot="icon-only" name="star"></wje-icon>
        </wje-button>
      </div>
    </div>
  </body>
</html>
