<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>

    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />

  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; align-items: center; gap: 0.25rem">
        <wje-button size="small">Small</wje-button>
        <wje-button size="default">Default</wje-button>
        <wje-button size="large">Large</wje-button>
        <div style="min-width: 10%"></div>
        <wje-button size="small"><wje-icon slot="start" name="star"></wje-icon>Small</wje-button>
        <wje-button><wje-icon slot="start" name="star"></wje-icon>Default</wje-button>
        <wje-button size="large"><wje-icon slot="start" name="star"></wje-icon>Large</wje-button>
      </div>
    </div>
  </body>
</html>
