<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Button</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script
        type="module"
        src="https://cdn.jsdelivr.net/npm/wj-elements@0.1.138/dist/wje-master.min.js"
    ></script>
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/wj-elements@0.1.138/dist/styles.min.css"
    />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.min.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="display: flex; align-items: center; gap: 0.25rem">
        <wje-button size="small">Small</wje-button>
        <wje-button size="default">Default</wje-button>
        <wje-button size="large">Large</wje-button>
        <div style="min-width: 10%"></div>
        <wje-button size="small"><wje-icon slot="start" name="star"></wje-icon>Small</wje-button>
        <wje-button><wje-icon slot="start" name="star"></wje-icon>Default</wje-button>
        <wje-button size="large"><wje-icon slot="start" name="star"></wje-icon>Large</wje-button>
      </div>
    </div>
  </body>
</html>
