<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dropdown</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `https://cdn.jsdelivr.net/npm/wj-elements@0/dist/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/light.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/dark.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/wj-elements@0/dist/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="flex-direction: column; justify-content: flex-start; margin-bottom: 30%">
        <wje-dropdown label="Start" placement="bottom-start" offset="5">
          <wje-button size="large" slot="trigger" stop-propagation="true" caret>Click</wje-button>
          <wje-menu variant="context">
            <wje-menu-item>
              <wje-icon name="plane" slot="start"></wje-icon>
              <wje-label>Menu item</wje-label>
            </wje-menu-item>
            <wje-menu-item>
              <wje-icon name="book" slot="start"></wje-icon>
              <wje-label>Menu item</wje-label>
            </wje-menu-item>
            <wje-menu-item>
              <wje-icon name="music" slot="start"></wje-icon>
              <wje-label>Menu item</wje-label>
            </wje-menu-item>
            <wje-menu-item>
              <wje-icon name="video" slot="start"></wje-icon>
              <wje-label>Menu item</wje-label>
            </wje-menu-item>
          </wje-menu>
        </wje-dropdown>
      </div>
    </div>
  </body>
</html>
