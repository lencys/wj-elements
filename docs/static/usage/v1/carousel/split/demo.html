<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy Button</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary, getIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="width: 400px">
        <wje-carousel pagination class="example-content">
          <wje-carousel-item>
            <div>A</div>
            <div>B</div>
          </wje-carousel-item>
          <wje-carousel-item>
            <div>C</div>
            <div>D</div>
          </wje-carousel-item>
          <wje-carousel-item>
            <div>E</div>
            <div>F</div>
          </wje-carousel-item>
          <wje-carousel-item>
            <div>G</div>
            <div>H</div>
          </wje-carousel-item>
        </wje-carousel>
        <style>
          .example-content {
            --wje-carousel-width: 400px;
          }

          .example-content div {
            width: 200px;
            height: 300px;
            display: flex;
            align-items: center;
            justify-content: center;
          }

          .example-content div:first-child {
            background-color: #f00;
          }

          .example-content div:last-child {
            background-color: #00f;
          }
        </style>
      </div>
    </div>
  </body>
</html>
