<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Copy Button</title>
    <link rel="stylesheet" href="../../../common.css" />
    <script src="../../../common.js"></script>
    <script type="module" src="../../../../wj-elementy/wj-master.js"></script>
    <link rel="stylesheet" href="../../../../wj-elementy/style.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="width: 400px;">
        <wj-carousel pagination class="example-content">
          <wj-carousel-item>
            <div>A</div>
            <div>B</div>
          </wj-carousel-item>
          <wj-carousel-item>
            <div>C</div>
            <div>D</div>
          </wj-carousel-item>
          <wj-carousel-item>
            <div>E</div>
            <div>F</div>
          </wj-carousel-item>
          <wj-carousel-item>
            <div>G</div>
            <div>H</div>
          </wj-carousel-item>
        </wj-carousel>
        <style>
            .example-content {
                --wj-carousel-width: 400px;
            }

            .example-content div {
                width: 200px;
                height: 300px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .example-content div:first-child {
                background-color: #f00;
            }

            .example-content div:last-child {
                background-color: #00f;
            }
        </style>
      </div>
    </div>
  </body>
</html>
