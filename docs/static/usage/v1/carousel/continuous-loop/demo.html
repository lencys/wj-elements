<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Continuous Loop</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="width: 100%">
        <wje-carousel pagination loop continuous-loop navigation slide-per-page="5" class="example-continuous-loop">
          <wje-carousel-item><article class="demo-tile">1</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">2</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">3</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">4</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">5</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">6</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">7</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">8</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">9</article></wje-carousel-item>
          <wje-carousel-item><article class="demo-tile">10</article></wje-carousel-item>
        </wje-carousel>
        <style>
          .example-continuous-loop {
            --wje-carousel-height: 180px;
            --wje-carousel-gap: 1rem;
          }

          .example-continuous-loop .demo-tile {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #7b2cbf, #3a86ff);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
          }
        </style>
      </div>
    </div>
  </body>
</html>
