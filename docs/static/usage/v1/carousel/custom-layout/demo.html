<!doctype html>
<html lang="en-gb">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carousel Custom Layout</title>
    <script src="../../common.js"></script>
    <script type="module">
      import { registerIconLibrary } from "/wje-elementy/wje-icon-library.js";

      registerIconLibrary("default", {
        resolver: (name, style) => `/wje-elementy/assets/img/icons/${style}/${name}.svg`
      });
    </script>
    <script type="module" src="/wje-elementy/wje-master.js"></script>

    <link rel="stylesheet" href="../../common.css" />
    <link rel="stylesheet" href="/wje-elementy/light.css" />
    <link rel="stylesheet" href="/wje-elementy/dark.css" />
    <link rel="stylesheet" href="/wje-elementy/styles.css" />
  </head>
  <body>
    <div class="container">
      <div class="content" style="width: 100%">
        <wje-carousel pagination navigation slide-per-page="1" class="example-single-layout">
          <wje-carousel-item>
            <div class="cards-grid">
              <article class="promo-card">1</article>
              <article class="promo-card">2</article>
              <article class="promo-card">3</article>
              <article class="promo-card">4</article>
              <article class="promo-card">5</article>
            </div>
          </wje-carousel-item>
          <wje-carousel-item>
            <div class="cards-grid">
              <article class="promo-card">6</article>
              <article class="promo-card">7</article>
              <article class="promo-card">8</article>
              <article class="promo-card">9</article>
              <article class="promo-card">10</article>
            </div>
          </wje-carousel-item>
        </wje-carousel>
        <style>
          .example-single-layout {
            --wje-carousel-height: 180px;
            --wje-carousel-gap: 1rem;
          }

          .example-single-layout .cards-grid {
            display: grid;
            grid-template-columns: repeat(5, minmax(0, 1fr));
            gap: 1rem;
            height: 100%;
          }

          .example-single-layout .promo-card {
            width: 100%;
            height: 100%;
            display: grid;
            place-items: center;
            border-radius: 0.75rem;
            background: linear-gradient(135deg, #1b4965, #4f86c6);
            color: #fff;
            font-size: 1.5rem;
            font-weight: 700;
          }
        </style>
      </div>
    </div>
  </body>
</html>
